<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#08080c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Finance Tracker Pro">
<title>Finance Tracker Pro</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:'DM Mono','Courier New',monospace;background:#08080c;color:#f0ece4;min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 14px;outline:none;transition:border .3s}
input:focus,select:focus,textarea:focus{border-color:var(--ac)}
select{appearance:none}
canvas{display:block;width:100%!important}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#4a4650;border-radius:4px}
a{color:inherit;text-decoration:none}
.hidden{display:none!important}

:root{
  --bg:#08080c;--sf:#0e0e14;--card:rgba(255,255,255,.025);--ch:rgba(255,255,255,.045);
  --cb:rgba(255,255,255,.06);--ac:#c9a84c;--acr:201,168,76;--acl:#e5d192;
  --acg:rgba(201,168,76,.12);--t1:#f0ece4;--t2:#8a8690;--tm:#4a4650;
  --ok:#22c55e;--no:#ef4444;--wn:#f59e0b;--inf:#3b82f6;
  --sh:0 8px 32px rgba(0,0,0,.4);--gb:rgba(255,255,255,.02);--gbd:rgba(255,255,255,.06);
  --r1:8px;--r2:12px;--r3:16px;--r4:24px;--tr:.3s cubic-bezier(.4,0,.2,1);
  --fd:'Syne',sans-serif;--fb:'DM Mono',monospace;
}
[data-t="light"]{
  --bg:#f5f3ef;--sf:#fff;--card:rgba(255,255,255,.85);--ch:rgba(255,255,255,.97);
  --cb:rgba(0,0,0,.07);--t1:#1a1a2e;--t2:#64647c;--tm:#a0a0b8;
  --sh:0 8px 32px rgba(0,0,0,.06);--gb:rgba(255,255,255,.55);--gbd:rgba(0,0,0,.06);
}
[data-c="royal-blue"]{--ac:#2563eb;--acr:37,99,235;--acl:#60a5fa;--acg:rgba(37,99,235,.12)}
[data-c="emerald"]{--ac:#059669;--acr:5,150,105;--acl:#34d399;--acg:rgba(5,150,105,.12)}
[data-c="crimson"]{--ac:#dc2626;--acr:220,38,38;--acl:#f87171;--acg:rgba(220,38,38,.12)}
[data-c="midnight-purple"]{--ac:#7c3aed;--acr:124,58,237;--acl:#a78bfa;--acg:rgba(124,58,237,.12)}
[data-c="black-gold"]{--ac:#c9a84c;--acr:201,168,76;--acl:#e5d192;--acg:rgba(201,168,76,.12)}
[data-f="playfair"]{--fd:'Playfair Display',serif;--fb:'Playfair Display',serif}
[data-f="outfit"]{--fd:'Outfit',sans-serif;--fb:'Outfit',sans-serif}
[data-f="sora"]{--fd:'Sora',sans-serif;--fb:'Sora',sans-serif}
[data-f="manrope"]{--fd:'Manrope',sans-serif;--fb:'Manrope',sans-serif}
[data-f="jakarta"]{--fd:'Plus Jakarta Sans',sans-serif;--fb:'Plus Jakarta Sans',sans-serif}
[data-f="lexend"]{--fd:'Lexend',sans-serif;--fb:'Lexend',sans-serif}
[data-f="cormorant"]{--fd:'Cormorant Garamond',serif;--fb:'Cormorant Garamond',serif}
[data-f="lora"]{--fd:'Lora',serif;--fb:'Lora',serif}
[data-f="dm"]{--fd:'DM Mono',monospace;--fb:'DM Mono',monospace}

.glass{background:var(--gb);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--gbd);border-radius:var(--r3)}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:#08080c;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .5s}
#splash.hide{opacity:0;pointer-events:none}
.sp-ring{width:100px;height:100px;margin-bottom:24px;animation:spin 3s linear infinite}
.sp-ring circle{fill:none;stroke:#c9a84c;stroke-width:2;stroke-dasharray:100 200;stroke-linecap:round}
@keyframes spin{to{transform:rotate(360deg)}}
.sp-logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;color:#c9a84c;letter-spacing:.05em;animation:fadeUp .6s .3s both}
.sp-sub{font-family:'DM Mono',monospace;color:#4a4650;font-size:.8rem;margin-top:8px;animation:fadeUp .6s .5s both}
.sp-bar{width:120px;height:2px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:28px;overflow:hidden;animation:fadeUp .4s .7s both}
.sp-fill{height:100%;width:0;background:#c9a84c;border-radius:2px;animation:barFill 1.2s .8s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes barFill{to{width:100%}}

/* SETUP */
#setup{position:fixed;inset:0;z-index:9998;background:#08080c;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.setup-box{width:100%;max-width:380px;text-align:center}
.setup-box .logo-h{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:#c9a84c;margin-bottom:6px}
.setup-box .sub-h{color:#8a8690;font-size:.82rem;margin-bottom:28px}
.setup-box label{display:block;text-align:left;font-size:.78rem;color:#8a8690;margin:16px 0 6px}
.setup-box input{width:100%;padding:12px 16px;font-size:.9rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:#f0ece4;border-radius:8px}
.setup-box input:focus{border-color:#c9a84c}
.setup-btn{width:100%;padding:14px;border-radius:12px;background:#c9a84c;color:#000;font-weight:600;font-size:.9rem;margin-top:24px;transition:all .3s}
.setup-btn:hover{box-shadow:0 4px 20px rgba(201,168,76,.4);transform:translateY(-1px)}
.setup-err{color:#ef4444;font-size:.78rem;margin-top:10px;min-height:20px}

/* PIN */
#pinLock{position:fixed;inset:0;z-index:9998;background:#08080c;display:flex;align-items:center;justify-content:center;padding:20px}
.pin-in{text-align:center;width:100%;max-width:300px}
.pin-in h2{font-family:'Syne',sans-serif;font-weight:700;font-size:1.3rem;margin-bottom:6px}
.pin-in .pin-sub{color:#8a8690;font-size:.78rem;margin-bottom:24px}
.pin-dots{display:flex;gap:16px;justify-content:center;margin-bottom:28px}
.pin-dots span{width:14px;height:14px;border-radius:50%;border:2px solid #4a4650;transition:all .2s}
.pin-dots span.on{background:#c9a84c;border-color:#c9a84c;box-shadow:0 0 8px rgba(201,168,76,.4)}
.pin-pad{display:grid;grid-template-columns:repeat(3,64px);gap:12px;justify-content:center}
.pin-pad button{width:64px;height:64px;border-radius:50%;font-size:1.4rem;font-family:'Syne',sans-serif;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:#f0ece4;transition:all .15s}
.pin-pad button:active{transform:scale(.9);background:rgba(201,168,76,.15)}
.pin-fp{margin-top:20px;font-size:.78rem;color:#c9a84c;cursor:pointer}
.pin-fp:hover{opacity:.7}

/* APP LAYOUT */
#app{display:flex;min-height:100vh;min-height:100dvh}
.sidebar{width:220px;background:var(--sf);border-right:1px solid var(--cb);display:flex;flex-direction:column;padding:20px 12px;position:fixed;top:0;bottom:0;left:0;z-index:100;transition:transform var(--tr)}
.sb-brand{display:flex;align-items:center;gap:10px;padding:8px 12px 24px;font-family:var(--fd);font-weight:700;font-size:1.1rem;color:var(--ac)}
.sb-nav{flex:1;display:flex;flex-direction:column;gap:2px}
.sb-btn{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r2);color:var(--t2);transition:all var(--tr);font-size:.88rem;width:100%;text-align:left}
.sb-btn:hover,.sb-btn.active{background:var(--acg);color:var(--ac)}
.sb-foot{border-top:1px solid var(--cb);padding-top:12px}
.main{flex:1;margin-left:0;display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;overflow-x:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;position:sticky;top:0;z-index:50;background:rgba(8,8,12,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--cb)}
[data-t="light"] .topbar{background:rgba(245,243,239,.88)}
.topbar-title{font-family:var(--fd);font-weight:600;font-size:1.05rem}
.tb-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:var(--r1);transition:background var(--tr)}
.tb-btn:hover{background:var(--ch)}
.views{flex:1;padding:20px;overflow-y:auto;padding-bottom:100px}
.view{display:none}
.view.active{display:block;animation:vi .3s ease}
@keyframes vi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.bnav-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(8,8,12,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--cb);display:flex;justify-content:space-around;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
[data-t="light"] .bnav-bar{background:rgba(245,243,239,.92)}
.bn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;font-size:.65rem;color:var(--tm);transition:color var(--tr);position:relative}
.bn.active{color:var(--ac)}
.bn.active::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:24px;height:2px;background:var(--ac);border-radius:2px}
#fab{position:fixed;bottom:80px;right:20px;z-index:90;width:56px;height:56px;border-radius:50%;background:var(--ac);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(var(--acr),.4);transition:transform .2s}
#fab:hover{transform:scale(1.08)}

/* DASHBOARD */
.dash-greet{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.dash-greet h2{font-family:var(--fd);font-weight:700;font-size:1.4rem}
.dash-greet p{color:var(--tm);font-size:.8rem;margin-top:4px}
.nw-card{padding:24px;margin-bottom:16px;position:relative;overflow:hidden;cursor:pointer;transition:transform var(--tr)}
.nw-card:hover{transform:translateY(-2px)}
.nw-lbl{font-size:.75rem;color:var(--tm);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.nw-val{font-family:var(--fd);font-weight:700;font-size:2rem;background:linear-gradient(135deg,var(--ac),var(--acl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nw-chg{margin-top:6px;font-size:.8rem;color:var(--tm)}
.nw-chg .up{color:var(--ok)}.nw-chg .dn{color:var(--no)}
.nw-spark{position:absolute;right:16px;bottom:12px;width:120px;opacity:.4}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.kpi{padding:16px;transition:transform var(--tr)}
.kpi:hover{transform:translateY(-2px)}
.kpi-icon{font-size:1.4rem;margin-bottom:8px}
.kpi-lbl{font-size:.7rem;color:var(--tm);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.kpi-v{font-family:var(--fd);font-weight:700;font-size:1.2rem}
.kpi-sub{font-size:.7rem;color:var(--tm);margin-top:4px}
.health-row{display:flex;align-items:center;gap:24px;padding:20px;margin-bottom:16px}
.health-gauge canvas{width:120px!important;height:120px!important}
.health-score{font-family:var(--fd);font-weight:800;font-size:2.4rem;color:var(--ac)}
.health-lbl{font-size:.8rem;color:var(--t2);margin-top:4px}
.chart-card{padding:20px;margin-bottom:16px}
.chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.chart-head h3{font-family:var(--fd);font-weight:600;font-size:.95rem}
.ptabs{display:flex;gap:4px}
.ptab{padding:4px 12px;border-radius:20px;font-size:.72rem;color:var(--tm);transition:all var(--tr)}
.ptab.active{background:var(--acg);color:var(--ac)}
.ins-card{padding:20px;margin-bottom:16px}
.ins-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ai-tag{background:linear-gradient(135deg,var(--ac),var(--acl));color:#000;font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:4px}
.ins-head h3{font-family:var(--fd);font-weight:600;font-size:.95rem}
.ins-list{display:flex;flex-direction:column;gap:10px}
.ins-item{display:flex;gap:12px;padding:12px;border-radius:var(--r2);background:var(--card);border:1px solid var(--cb);font-size:.82rem;line-height:1.5}
.rc-card{padding:20px;margin-bottom:16px}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.card-top h3{font-family:var(--fd);font-weight:600;font-size:.95rem}
.link-btn{font-size:.78rem;color:var(--ac);transition:opacity var(--tr)}
.link-btn:hover{opacity:.7}
.tx-list{display:flex;flex-direction:column;gap:8px}
.tx-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--r2);background:var(--card);border:1px solid var(--cb);transition:background var(--tr);cursor:pointer}
.tx-item:hover{background:var(--ch)}
.tx-cat{width:38px;height:38px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-weight:500;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-date{font-size:.7rem;color:var(--tm);margin-top:2px}
.tx-amt{font-family:var(--fd);font-weight:600;font-size:.95rem;flex-shrink:0}
.tx-amt.inc{color:var(--ok)}.tx-amt.exp{color:var(--no)}
.tx-empty{text-align:center;padding:40px;color:var(--tm);font-size:.85rem}

.view-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.view-top h2{font-family:var(--fd);font-weight:700;font-size:1.3rem}
.ac-btn{background:var(--ac);color:#fff;padding:10px 20px;border-radius:var(--r2);font-weight:600;font-size:.82rem;transition:all var(--tr)}
.ac-btn:hover{box-shadow:0 4px 16px rgba(var(--acr),.35);transform:translateY(-1px)}
.sum-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:16px}
.sum-c{padding:16px;text-align:center}
.sum-c .sl{font-size:.68rem;color:var(--tm);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.sum-c .sv{font-family:var(--fd);font-weight:700;font-size:1.1rem}
.flt-bar{display:flex;gap:10px;padding:12px 16px;margin-bottom:16px;flex-wrap:wrap}
.flt-bar select,.flt-bar input[type="month"]{flex:1;min-width:120px;padding:8px 12px;border-radius:var(--r1);background:var(--sf);font-size:.82rem}
.goals-grid{display:grid;gap:14px}
.goal-c{padding:20px;transition:transform var(--tr)}
.goal-c:hover{transform:translateY(-2px)}
.goal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.goal-nm{font-family:var(--fd);font-weight:600;font-size:.95rem}
.goal-dl{font-size:.7rem;color:var(--tm);padding:3px 10px;border-radius:20px;background:var(--card);border:1px solid var(--cb)}
.goal-bar{height:6px;background:var(--card);border-radius:6px;overflow:hidden;margin:12px 0}
.goal-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--ac),var(--acl));transition:width .8s ease}
.goal-sts{display:flex;justify-content:space-between;font-size:.78rem;color:var(--t2)}
.goal-acts{display:flex;gap:8px;margin-top:12px}
.goal-acts button{padding:6px 14px;border-radius:var(--r1);font-size:.75rem;border:1px solid var(--cb);transition:all var(--tr)}
.goal-acts button:hover{border-color:var(--ac);color:var(--ac)}
.cal-nav{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;margin-bottom:12px}
.cal-nav span{font-family:var(--fd);font-weight:600}
.cal-nav button{width:36px;height:36px;border-radius:50%;font-size:1.2rem;transition:background var(--tr)}
.cal-nav button:hover{background:var(--ch)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:16px;margin-bottom:16px}
.cal-hd{text-align:center;font-size:.65rem;color:var(--tm);text-transform:uppercase;padding:8px 0}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:var(--r1);font-size:.8rem;cursor:pointer;transition:all var(--tr);position:relative}
.cal-d:hover{background:var(--ch)}
.cal-d.today{background:var(--acg);color:var(--ac);font-weight:600}
.cal-d.has::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--ac)}
.cal-d.other{opacity:.3}
.cal-sts{padding:16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px}
.cal-s{text-align:center}
.cal-s .cv{font-family:var(--fd);font-weight:700;font-size:1.1rem}
.cal-s .cl{font-size:.68rem;color:var(--tm);margin-top:4px}
.rpt-per{padding:16px;margin-bottom:16px}
.rpt-per select{width:100%;padding:10px 14px;border-radius:var(--r2);background:var(--sf)}
.rpt-content{display:flex;flex-direction:column;gap:16px}
.rpt-blk{padding:20px}
.rpt-blk h3{font-family:var(--fd);font-weight:600;font-size:.95rem;margin-bottom:14px}
.rpt-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--cb);font-size:.85rem}
.rpt-row:last-child{border:none}
.rpt-row .rl{color:var(--t2)}.rpt-row .rv{font-weight:500}
.exp-btns{display:flex;gap:10px;margin-top:16px}
.exp-btns button{flex:1;padding:10px;border-radius:var(--r2);border:1px solid var(--cb);font-size:.8rem;transition:all var(--tr)}
.exp-btns button:hover{border-color:var(--ac);color:var(--ac)}
.rem-list{display:flex;flex-direction:column;gap:10px}
.rem-c{display:flex;align-items:center;gap:14px;padding:16px;transition:all var(--tr)}
.rem-c.done{opacity:.5}
.rem-ico{width:40px;height:40px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;font-size:1.2rem;background:var(--acg)}
.rem-info{flex:1}
.rem-t{font-weight:500;font-size:.88rem}
.rem-d{font-size:.72rem;color:var(--tm);margin-top:3px}
.rem-acts{display:flex;gap:6px}
.rem-acts button{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all var(--tr)}
.rem-acts button:hover{background:var(--ch)}
.notes-list{display:grid;gap:12px}
.note-c{padding:16px;transition:all var(--tr)}
.note-c:hover{border-color:var(--acg)}
.note-dt{font-size:.68rem;color:var(--tm);margin-bottom:8px}
.note-txt{font-size:.85rem;line-height:1.6;color:var(--t2)}
.note-acts{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
.note-acts button{font-size:.72rem;color:var(--tm);transition:color var(--tr)}
.note-acts button:hover{color:var(--ac)}
.set-grps{display:flex;flex-direction:column;gap:16px}
.set-g{padding:20px}
.set-g h3{font-family:var(--fd);font-weight:600;font-size:.92rem;margin-bottom:14px;color:var(--ac)}
.set-r{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--cb);flex-wrap:wrap;gap:8px}
.set-r:last-child{border:none}
.set-lbl{font-size:.85rem}
.set-lbl small{display:block;color:var(--tm);font-size:.72rem;margin-top:3px}
.swatches{display:flex;gap:8px;flex-wrap:wrap}
.sw{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all var(--tr)}
.sw.on{border-color:var(--t1);box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--t1)}
.font-sel{display:flex;gap:6px;flex-wrap:wrap}
.font-o{padding:6px 14px;border-radius:20px;font-size:.75rem;border:1px solid var(--cb);cursor:pointer;transition:all var(--tr)}
.font-o.on{background:var(--acg);border-color:var(--ac);color:var(--ac)}
.rng{display:flex;align-items:center;gap:12px}
.rng input[type="range"]{flex:1;accent-color:var(--ac)}
.rng span{font-size:.8rem;color:var(--tm);min-width:30px;text-align:right}

/* ===== CHARTS ===== */
function initCvs(id,ch){
  var c=document.getElementById(id);if(!c||c.parentElement.clientWidth===0)return null;
  var dpr=window.devicePixelRatio||1,w=c.parentElement.clientWidth,h=ch||200;
  c.width=w*dpr;c.height=h*dpr;c.style.width=w+'px';c.style.height=h+'px';
  var ctx=c.getContext('2d');ctx.scale(dpr,dpr);return{ctx:ctx,w:w,h:h}
}
function gC(){var s=getComputedStyle(document.documentElement);return{ac:s.getPropertyValue('--ac').trim(),ok:s.getPropertyValue('--ok').trim(),tm:s.getPropertyValue('--tm').trim(),cb:s.getPropertyValue('--cb').trim()}}
function drawLine(id,ds,lbl){
  var cv=initCvs(id);if(!cv)return;var ctx=cv.ctx,w=cv.w,h=cv.h,c=gC();
  var p={t:20,r:16,b:30,l:50},gw=w-p.l-p.r,gh=h-p.t-p.b;
  var all=[];ds.forEach(function(d){d.data.forEach(function(v){all.push(v)})});
  var mx=Math.max.apply(null,all.concat([1]))*1.15;
  ctx.strokeStyle=c.cb;ctx.lineWidth=.5;
  for(var i=0;i<=4;i++){var y=p.t+gh-(gh*i/4);ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(w-p.r,y);ctx.stroke();ctx.fillStyle=c.tm;ctx.font='10px DM Mono';ctx.textAlign='right';ctx.fillText(fmt(Math.round(mx*i/4)),p.l-6,y+3)}
  ctx.textAlign='center';lbl.forEach(function(l,i){ctx.fillText(l,p.l+(gw/(lbl.length-1||1))*i,h-8)});
  ds.forEach(function(d,di){
    ctx.beginPath();ctx.strokeStyle=di===0?c.ac:c.ok;ctx.lineWidth=2.5;ctx.lineJoin='round';
    d.data.forEach(function(v,i){var x=p.l+(gw/(d.data.length-1||1))*i,y=p.t+gh-(v/mx)*gh;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});
    ctx.stroke();
    var last=d.data.length-1,lx=p.l+(gw/(last||1))*last;
    ctx.lineTo(lx,p.t+gh);ctx.lineTo(p.l,p.t+gh);ctx.closePath();
    var g=ctx.createLinearGradient(0,p.t,0,p.t+gh),bc=di===0?c.ac:c.ok;
    g.addColorStop(0,bc+'30');g.addColorStop(1,bc+'05');ctx.fillStyle=g;ctx.fill();
    d.data.forEach(function(v,i){var x=p.l+(gw/(d.data.length-1||1))*i,y=p.t+gh-(v/mx)*gh;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=di===0?c.ac:c.ok;ctx.fill()});
  });
}
function drawDoughnut(id,data){
  var cv=initCvs(id,220);if(!cv)return;var ctx=cv.ctx,w=cv.w,h=cv.h,c=gC();
  var cx=w/2,cy=h/2,r=Math.min(w,h)/2-24,lw=26,total=0;
  data.forEach(function(d){total+=d.value});if(!total)total=1;
  var start=-Math.PI/2;
  data.forEach(function(d){var ang=(d.value/total)*Math.PI*2;ctx.beginPath();ctx.arc(cx,cy,r,start,start+ang);ctx.lineWidth=lw;ctx.strokeStyle=d.c;ctx.stroke();start+=ang});
  ctx.fillStyle=c.tm;ctx.font='10px DM Mono';ctx.textAlign='center';ctx.fillText('Total',cx,cy-6);
  ctx.fillStyle=c.ac;ctx.font='bold 14px Syne';ctx.fillText(fmt(total),cx,cy+12);
}
function drawGauge(id,val){
  var cv=initCvs(id,120);if(!cv)return;var ctx=cv.ctx,w=cv.w,h=cv.h,c=gC();
  var cx=w/2,cy=h/2,r=Math.min(w,h)/2-14,pct=Math.min(val/100,1);
  var sa=Math.PI*.75,ea=Math.PI*2.25,rng=ea-sa;
  ctx.beginPath();ctx.arc(cx,cy,r,sa,ea);ctx.lineWidth=10;ctx.lineCap='round';ctx.strokeStyle=c.cb;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,r,sa,sa+rng*pct);ctx.lineWidth=10;ctx.lineCap='round';ctx.strokeStyle=c.ac;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,r,sa,sa+rng*pct);ctx.lineWidth=14;ctx.lineCap='round';ctx.strokeStyle=c.ac+'30';ctx.stroke();
}
function drawSpark(id,data){
  var cv=initCvs(id,40);if(!cv||!data.length)return;var ctx=cv.ctx,w=cv.w,h=cv.h,c=gC();
  var mx=Math.max.apply(null,[1].concat(data)),mn=Math.min.apply(null,[0].concat(data)),rng=mx-mn||1;
  ctx.beginPath();data.forEach(function(v,i){var x=(w/(data.length-1||1))*i,y=h-((v-mn)/rng)*h;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});
  ctx.strokeStyle=c.ac;ctx.lineWidth=1.5;ctx.stroke();
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
  var g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,c.ac+'25');g.addColorStop(1,c.ac+'02');ctx.fillStyle=g;ctx.fill();
}

/* ===== ANALYTICS ===== */
var An={
  mI:function(m){return sm(txs4('income',m))},mE:function(m){return sm(txs4('expense',m))},
  tI:function(){return sm(D.txs.filter(function(t){return t.type==='income'}))},
  tE:function(){return sm(D.txs.filter(function(t){return t.type==='expense'}))},
  sav:function(m){return this.mI(m||mk(todayStr()))-this.mE(m||mk(todayStr()))},
  savR:function(m){var i=this.mI(m||mk(todayStr()));return i>0?(i-this.mE(m||mk(todayStr())))/i*100:0},
  nw:function(){return this.tI()-this.tE()},
  health:function(){var r=this.savR(mk(todayStr())),inc=this.mI(mk(todayStr())),div={},dc=0;
    txs4('income',mk(todayStr())).forEach(function(t){if(!div[t.cat]){div[t.cat]=1;dc++}});
    var gs=0;D.goals.forEach(function(g){if(g.current>=g.target*.5)gs++});
    var gb=D.goals.length?gs/D.goals.length*20:10;
    return Math.min(Math.round(Math.max(r,0)*.65+gb+Math.min(dc*5,15)+(inc>0?5:0)),100)},
  healthL:function(s){return s>=80?'Excellent ŌĆö Keep building!':s>=60?'Good ŌĆö Room to optimize':s>=40?'Fair ŌĆö Focus on savings':s>=20?'Needs attention':'Critical'},
  trend:function(months){var now=new Date(),inc=[],exp=[],lbl=[];
    for(var i=months-1;i>=0;i--){var d=new Date(now.getFullYear(),now.getMonth()-i,1),m=mk(d);inc.push(this.mI(m));exp.push(this.mE(m));lbl.push(d.toLocaleString('default',{month:'short'}))}
    return{inc:inc,exp:exp,lbl:lbl}},
  catB:function(type,m){var txs=txs4(type,m),map={};txs.forEach(function(t){map[t.cat]=(map[t.cat]||0)+t.amount});
    var out=[];for(var k in map){var c=getCat(type,k);out.push({n:c.n,i:c.i,c:c.c,value:map[k]})}out.sort(function(a,b){return b.value-a.value});return out},
  avgM:function(type){var ms={};D.txs.filter(function(t){return t.type===type}).forEach(function(t){ms[mk(t.date)]=1});
    var c=Object.keys(ms).length;return c?sm(D.txs.filter(function(t){return t.type===type}))/c:0},
  insights:function(){var ins=[],m=mk(todayStr()),r=this.savR(m),inc=this.mI(m),exp=this.mE(m),h=this.health();
    if(r>30)ins.push({i:'­¤ī¤',t:'Excellent savings rate of '+fmtP(r)+'.'});
    else if(r>0)ins.push({i:'­¤ÆĪ',t:'Savings rate: '+fmtP(r)+'. Aim for 30%+.'});
    else if(inc>0)ins.push({i:'ŌÜĀ’ĖÅ',t:'Spending exceeds income this month.'});
    var top=this.catB('expense',m);if(top.length&&exp)ins.push({i:'­¤ōŖ',t:'Top: '+top[0].n+' at '+fmt(top[0].value)+'.'});
    if(h>=70)ins.push({i:'­¤Åå',t:'Health score: '+h+'/100. Strong!'});else ins.push({i:'­¤Ä»',t:'Health: '+h+'/100. Increase savings.'});
    var up=0;D.rems.forEach(function(r){if(!r.done&&new Date(r.date)>=new Date())up++});
    if(up)ins.push({i:'­¤öö',t:up+' upcoming reminder'+(up>1?'s':'')+'.'});
    if(!inc&&!exp)ins.push({i:'­¤ÜĆ',t:'Welcome! Add transactions to unlock insights.'});
    return ins.slice(0,5)}
};

function doRender(v){

    else if(v==='savings')renderSav();
    else if(v==='goals')renderGoals();

    else if(v==='reports')renderRpts();
    else if(v==='reminders')renderRems();
    else if(v==='notes')renderNotes();

  }catch(e){console.error('Render error:',e)}
}

function genRpt(){

  if(per==='month'){incTxs=txs4('income',mk2);expTxs=txs4('expense',mk2);label='This Month'}
  else if(per==='quarter'){var qm=Math.floor(now.getMonth()/3)*3;incTxs=D.txs.filter(function(t){return t.type==='income'&&new Date(t.date).getMonth()>=qm&&new Date(t.date).getMonth()<qm+3});expTxs=D.txs.filter(function(t){return t.type==='expense'&&new Date(t.date).getMonth()>=qm&&new Date(t.date).getMonth()<qm+3});label='This Quarter'}

  var h='<div class="rpt-blk glass"><h3>'+label+' Summary</h3><div class="rpt-row"><span class="rl">Income</span><span class="rv" style="color:var(--ok)">'+fmt(inc)+'</span></div><div class="rpt-row"><span class="rl">Expenses</span><span class="rv" style="color:var(--no)">'+fmt(exp)+'</span></div><div class="rpt-row"><span class="rl">Savings</span><span class="rv" style="color:'+(sav>=0?'var(--ok)':'var(--no)')+'">'+fmt(sav)+'</span></div><div class="rpt-row"><span class="rl">Rate</span><span class="rv">'+fmtP(rate)+'</span></div><div class="rpt-row"><span class="rl">Transactions</span><span class="rv">'+(incTxs.length+expTxs.length)+'</span></div></div>';
  h+='<div class="exp-btns"><button onclick="dlJSON()">­¤ōä JSON</button><button onclick="dlCSV()">­¤ōŖ CSV</button></div>';
  $('#rptContent').innerHTML=h;
}

function openChgPw(){
  openModal('Change Password','<label>Current Password</label><input type="password" id="cpwOld"><label>New Password</label><input type="password" id="cpwNew"><label>Confirm</label><input type="password" id="cpwNew2"><div class="f-acts"><button class="btn-cn" onclick="closeModal()">Cancel</button><button class="btn-sv" id="cpwBtn">Update</button></div>');
  $('#cpwBtn').onclick=function(){verifyPw($('#cpwOld').value).then(function(ok){if(!ok){toast('Wrong password','er');return}var np=$('#cpwNew').value;if(np.length<6){toast('Min 6 chars','er');return}if(np!==$('#cpwNew2').value){toast('Mismatch','er');return}hashStr(np).then(function(h){D.settings.pwHash=h;saveData(D);closeModal();toast('Password changed!','ok')})})};
}
function openChgPin(){
  openModal('Change PIN','<label>Password (verify)</label><input type="password" id="cpinPw"><label>New PIN</label><input type="password" id="cpinN" maxlength="4" inputmode="numeric"><label>Confirm</label><input type="password" id="cpinN2" maxlength="4" inputmode="numeric"><div class="f-acts"><button class="btn-cn" onclick="closeModal()">Cancel</button><button class="btn-sv" id="cpinBtn">Update</button></div>');
  $('#cpinBtn').onclick=function(){verifyPw($('#cpinPw').value).then(function(ok){if(!ok){toast('Wrong password','er');return}var pn=$('#cpinN').value;if(!/^\d{4}$/.test(pn)){toast('PIN must be 4 digits','er');return}if(pn!==$('#cpinN2').value){toast('Mismatch','er');return}hashStr(pn).then(function(h){D.settings.pinHash=h;saveData(D);closeModal();toast('PIN changed!','ok')})})};
}
function doRestore(){var inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.txs){D=d;if(!D.settings)D.settings=JSON.parse(JSON.stringify(DEF.settings));saveData(D);applyTheme();renderView(curView);toast('Restored!','ok')}else toast('Invalid file','er')}catch(e){toast('Invalid file','er')}};r.readAsText(f)};inp.click()}

/* ===== HELPERS ===== */
function bindTxClicks(sel){var items=$(sel).querySelectorAll('.tx-item');for(var i=0;i<items.length;i++){items[i].onclick=(function(id){return function(){openEditTx(id)}})(items[i].dataset.id)}}

/* ===== FAB ===== */
function fabAction(){
  if(curView==='income')openAddTx('income');
  else if(curView==='expense')openAddTx('expense');
  else if(curView==='goals')openAddGoal();
  else if(curView==='reminders')openAddRem();
  else if(curView==='notes')openAddNote();
  else openAddTx('expense');
}

/* ===== INIT ===== */
function init(){
  try{applyTheme();loadFont(D.settings.font)}catch(e){console.error(e)}

  // Build sidebar
  var sbHtml='';NAVS.forEach(function(n){sbHtml+='<button class="sb-btn'+(n.id==='dashboard'?' active':'')+'" data-v="'+n.id+'">'+n.ic+'<span>'+n.l+'</span></button>'});
  $('#sbNav').innerHTML=sbHtml;

  // Build bottom nav
  var bnHtml='<button class="bn active" data-v="dashboard"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span>Home</span></button>';
  bnHtml+='<button class="bn" data-v="income"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg><span>Income</span></button>';
  bnHtml+='<button class="bn" data-v="expense"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span>Expense</span></button>';
  bnHtml+='<button class="bn" data-v="goals"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg><span>Goals</span></button>';
  bnHtml+='<button class="bn" data-v="more"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg><span>More</span></button>';
  $('#bnav').innerHTML=bnHtml;

  // Pin pad
  var ppHtml='';[1,2,3,4,5,6,7,8,9,'',0,'Ōī½'].forEach(function(n){
    if(n==='')ppHtml+='<button style="visibility:hidden">.</button>';
    else if(n==='Ōī½')ppHtml+='<button id="pinDel">Ōī½</button>';
    else ppHtml+='<button class="pin-n" data-n="'+n+'">'+n+'</button>';
  });
  $('#pinPad').innerHTML=ppHtml;

  // Event delegation
  document.addEventListener('click',function(e){
    var t=e.target;
    // Sidebar nav
    if(t.closest('.sb-btn')){var v=t.closest('.sb-btn').dataset.v;if(v)renderView(v);$('#sidebar').classList.remove('open');return}
    // Bottom nav
    if(t.closest('.bn')){var v=t.closest('.bn').dataset.v;if(v==='more'){$('#moreD').classList.toggle('hidden')}else if(v){renderView(v)}return}
    // More drawer
    if(t.closest('.more-p button[data-nav]')){renderView(t.closest('button[data-nav]').dataset.nav);$('#moreD').classList.add('hidden');return}
    if(t.id==='moreOv'){$('#moreD').classList.add('hidden');return}
    // Menu
    if(t.closest('#menuBtn')){$('#sidebar').classList.toggle('open');return}
    // Search
    if(t.closest('#searchBtn')){$('#searchOv').classList.remove('hidden');$('#searchIn').focus();return}
    if(t.closest('#searchClose')){$('#searchOv').classList.add('hidden');$('#searchIn').value='';$('#searchRes').innerHTML='';return}
    // Modal close
    if(t.id==='modalOv'||t.closest('#mdlClose')){closeModal();return}
    if(t.closest('.modal')){e.stopPropagation()}
    // FAB
    if(t.closest('#fab')){fabAction();return}
    // Setup
    if(t.id==='suBtn'){doSetup();return}
    // Pin
    if(t.closest('.pin-n')){doPinPress(t.closest('.pin-n').dataset.n);return}
    if(t.id==='pinDel'){doPinDel();return}
    if(t.id==='pwInstead'){showPwModal();return}
    // PW modal
    if(t.id==='pwUnlockBtn'){doPwUnlock();return}
    if(t.id==='pwCancelBtn'){hidePwModal();return}
    // Settings
    if(t.closest('#sbSettings')){renderView('settings');$('#sidebar').classList.remove('open');return}
  });

  // Search input
  $('#searchIn').addEventListener('input',function(){
    var q=this.value.trim();if(!q){$('#searchRes').innerHTML='';return}
    var res=D.txs.filter(function(t){return getCat(t.type,t.cat).n.toLowerCase().indexOf(q.toLowerCase())>=0||(t.note||'').toLowerCase().indexOf(q.toLowerCase())>=0}).slice(0,20);
    var h='';if(res.length){res.forEach(function(t){var c=getCat(t.type,t.cat);h+='<div class="tx-item" data-id="'+t.id+'"><div class="tx-cat" style="background:'+c.c+'22">'+c.i+'</div><div class="tx-info"><div class="tx-name">'+c.n+'</div><div class="tx-date">'+t.date+'</div></div><div class="tx-amt '+(t.type==='income'?'inc':'exp')+'">'+(t.type==='income'?'+':'ŌłÆ')+' '+fmt(t.amount)+'</div></div>'})}else h='<p class="tx-empty">No results</p>';
    $('#searchRes').innerHTML=h;
    bindTxClicks('#searchRes');
  });

  // PW input enter key
  $('#pwInput').addEventListener('keydown',function(e){if(e.key==='Enter')doPwUnlock()});

  // Resize
  var rt;window.addEventListener('resize',function(){clearTimeout(rt);rt=setTimeout(function(){if($('#app').classList.contains('hidden'))return;renderView(curView)},300)});

  // Splash ŌåÆ setup/pin
  setTimeout(function(){
    var sp=$('#splash');if(sp){sp.classList.add('hide')}
    setTimeout(function(){
      if(sp)sp.style.display='none';
      if(D.settings.pwHash){$('#pinLock').classList.remove('hidden')}
      else{$('#setup').classList.remove('hidden')}
    },500);
  },1500);

  // Failsafe
  setTimeout(function(){
    if($('#splash')&&$('#splash').style.display!=='none'){
      $('#splash').style.display='none';
      if(D.settings.pwHash){$('#pinLock').classList.remove('hidden')}
      else{$('#setup').classList.remove('hidden')}
    }
  },4000);
}

// BOOT
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init)}
else{init()}

// SW
if('serviceWorker' in navigator){try{navigator.serviceWorker.register('sw.js')}catch(e){}}

})();
</script>
</body>
</html>
